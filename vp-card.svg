<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#040408"/>
      <stop offset="60%"  stop-color="#080408"/>
      <stop offset="100%" stop-color="#180808"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="100%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7c2d12" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.65)"/>
    </radialGradient>

    <filter id="rGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feFlood flood-color="#B91C1C" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="wShad" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.95"/>
    </filter>

    <filter id="gGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feFlood flood-color="#CA8A04" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#bg)"/>
  <rect width="300" height="450" fill="url(#glow)"/>

  <!-- Horizon bands -->
  <rect x="0" y="340" width="300" height="1" fill="rgba(160,48,28,0.12)"/>
  <rect x="0" y="362" width="300" height="1" fill="rgba(160,48,28,0.10)"/>
  <rect x="0" y="380" width="300" height="1" fill="rgba(160,48,28,0.16)"/>

  <!-- Ground -->
  <rect x="0" y="385" width="300" height="65" fill="#040404"/>

  <!-- Background buildings — left -->
  <g fill="#070707">
    <rect x="0"   y="338" width="28" height="62"/>
    <rect x="24"  y="348" width="36" height="52"/>
    <rect x="56"  y="334" width="22" height="66"/>
    <rect x="74"  y="346" width="30" height="54"/>
  </g>

  <!-- Background buildings — right -->
  <g fill="#070707">
    <rect x="196" y="340" width="32" height="60"/>
    <rect x="224" y="350" width="38" height="50"/>
    <rect x="258" y="336" width="24" height="64"/>
    <rect x="278" y="348" width="22" height="52"/>
  </g>

  <!-- Centre house -->
  <g fill="#060606">
    <rect x="112" y="306" width="76" height="94"/>
    <polygon points="105,306 150,260 195,306"/>
    <rect x="158" y="268" width="10" height="20" fill="#050505"/>
    <rect x="170" y="330" width="22" height="70" fill="#050505"/>
    <rect x="130" y="340" width="18" height="60" fill="#040404"/>
    <rect x="118" y="316" width="16" height="14" fill="#040404"/>
    <rect x="165" y="316" width="16" height="14" fill="#040404"/>
  </g>

  <!-- Palm — left -->
  <g fill="#050505">
    <path d="M 74,390 C 73,368 74,345 76,324 C 77,316 78,311 79,308 L 83,309 C 82,312 81,317 80,325 C 78,346 77,369 76,390 Z"/>
    <path d="M 81,309 C 73,304 62,299 50,297 C 63,295 74,301 81,309 Z"/>
    <path d="M 81,309 C 74,308 65,311 54,317 C 66,308 76,305 81,309 Z"/>
    <path d="M 81,309 C 79,300 79,289 81,278 C 81,289 81,300 81,309 Z"/>
    <path d="M 81,309 C 89,304 100,299 112,297 C 99,295 88,301 81,309 Z"/>
    <path d="M 81,309 C 88,308 97,311 108,317 C 96,308 86,305 81,309 Z"/>
    <path d="M 81,309 C 87,302 91,293 90,282 C 88,293 83,302 81,309 Z"/>
  </g>

  <!-- Palm — right -->
  <g fill="#050505">
    <path d="M 226,390 C 227,368 226,345 224,324 C 223,316 222,311 221,308 L 217,309 C 218,312 219,317 220,325 C 222,346 223,369 224,390 Z"/>
    <path d="M 219,309 C 227,304 238,299 250,297 C 237,295 226,301 219,309 Z"/>
    <path d="M 219,309 C 226,308 235,311 246,317 C 234,308 224,305 219,309 Z"/>
    <path d="M 219,309 C 221,300 221,289 219,278 C 219,289 219,300 219,309 Z"/>
    <path d="M 219,309 C 211,304 200,299 188,297 C 201,295 212,301 219,309 Z"/>
    <path d="M 219,309 C 212,308 203,311 192,317 C 204,308 214,305 219,309 Z"/>
    <path d="M 219,309 C 213,302 209,293 210,282 C 212,293 217,302 219,309 Z"/>
  </g>

  <!-- Chip truck -->
  <g fill="#040404">
    <rect x="6"  y="364" width="58" height="22"/>
    <rect x="9"  y="354" width="28" height="12"/>
    <circle cx="18" cy="388" r="7" fill="#030303"/>
    <circle cx="18" cy="388" r="2" fill="#060606"/>
    <circle cx="55" cy="388" r="7" fill="#030303"/>
    <circle cx="55" cy="388" r="2" fill="#060606"/>
  </g>

  <!-- Vignette -->
  <rect width="300" height="450" fill="url(#vig)"/>

  <!-- Title block -->
  <!-- Rules + THE -->
  <line x1="68"  y1="118" x2="128" y2="118" stroke="rgba(202,138,4,0.3)" stroke-width="0.8"/>
  <line x1="172" y1="118" x2="232" y2="118" stroke="rgba(202,138,4,0.3)" stroke-width="0.8"/>

  <text x="150" y="124"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="13"
        fill="#CA8A04"
        letter-spacing="10"
        filter="url(#gGlow)">THE</text>

  <text x="150" y="196"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="70"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-2"
        filter="url(#wShad)">VILLAGE</text>

  <text x="150" y="262"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="70"
        font-weight="700"
        fill="#B91C1C"
        letter-spacing="-2"
        filter="url(#rGlow)">PEOPLE</text>

  <!-- Divider -->
  <line x1="60" y1="274" x2="240" y2="274" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="150" y="292"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="8"
        fill="rgba(255,255,255,0.35)"
        letter-spacing="4">SOMETHING IS ALWAYS OFF.</text>

  <!-- Season info -->
  <text x="150" y="430"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="9"
        fill="rgba(255,255,255,0.22)"
        letter-spacing="3">SEASON 1  ·  2026</text>

  <!-- Netflix N -->
  <rect x="254" y="14" width="34" height="22" rx="2" fill="#E50914"/>
  <text x="271" y="30"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="16"
        font-weight="900"
        fill="white">N</text>

  <!-- Grain -->
  <rect width="300" height="450" opacity="0.04" filter="url(#grain)"/>

</svg>
