<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>

    <!-- Background: near-black with deep red warmth rising from bottom -->
    <linearGradient id="bgMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#04040a"/>
      <stop offset="55%"  stop-color="#080408"/>
      <stop offset="100%" stop-color="#160606"/>
    </linearGradient>

    <!-- Horizon warmth: radial orange-red glow from bottom-center -->
    <radialGradient id="horizGlow" cx="50%" cy="100%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7c2d12" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#9a1b1b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9a1b1b" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette: darken corners -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>

    <!-- Centre-top glow: very subtle blue-black depth -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0a0a18" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a18" stop-opacity="0"/>
    </radialGradient>

    <!-- Red text glow (PEOPLE) -->
    <filter id="redGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feFlood flood-color="#B91C1C" flood-opacity="0.55" result="clr"/>
      <feComposite in="clr" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- White text shadow (VILLAGE) -->
    <filter id="wShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.92"/>
    </filter>

    <!-- Gold eyebrow glow -->
    <filter id="goldGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#CA8A04" flood-opacity="0.5" result="clr"/>
      <feComposite in="clr" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Film grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

  </defs>

  <!-- ═══ BACKGROUND LAYERS ═══ -->
  <rect width="1280" height="720" fill="url(#bgMain)"/>
  <rect width="1280" height="720" fill="url(#horizGlow)"/>
  <rect width="1280" height="720" fill="url(#topGlow)"/>

  <!-- Subtle warm horizon bands -->
  <rect x="0" y="555" width="1280" height="1" fill="rgba(160,48,28,0.10)"/>
  <rect x="0" y="575" width="1280" height="2" fill="rgba(160,48,28,0.08)"/>
  <rect x="0" y="600" width="1280" height="1" fill="rgba(160,48,28,0.14)"/>

  <!-- ═══ LANDSCAPE SILHOUETTES ═══ -->

  <!-- Ground plane -->
  <rect x="0" y="612" width="1280" height="108" fill="#040404"/>

  <!-- Background buildings — left -->
  <g fill="#070707">
    <rect x="0"   y="542" width="48"  height="88"/>
    <rect x="44"  y="557" width="62"  height="73"/>
    <rect x="102" y="532" width="38"  height="98"/>
    <rect x="136" y="552" width="52"  height="78"/>
    <rect x="184" y="540" width="36"  height="90"/>
    <rect x="216" y="563" width="48"  height="67"/>
    <rect x="258" y="549" width="28"  height="81"/>
  </g>

  <!-- Background buildings — right -->
  <g fill="#070707">
    <rect x="992"  y="546" width="52"  height="84"/>
    <rect x="1040" y="559" width="64"  height="71"/>
    <rect x="1100" y="534" width="40"  height="96"/>
    <rect x="1136" y="554" width="56"  height="76"/>
    <rect x="1188" y="541" width="44"  height="89"/>
    <rect x="1228" y="565" width="52"  height="65"/>
  </g>

  <!-- Centre house silhouette -->
  <g fill="#060606">
    <rect x="494" y="492" width="292" height="138"/>
    <polygon points="472,492 640,402 808,492"/>
    <rect x="686" y="415" width="24"  height="50"/>
    <rect x="736" y="532" width="94"  height="98" fill="#050505"/>
    <rect x="608" y="548" width="52"  height="82" fill="#040404"/>
    <rect x="524" y="514" width="46"  height="34" fill="#040404"/>
    <rect x="670" y="514" width="46"  height="34" fill="#040404"/>
  </g>

  <!-- Palm tree — LEFT (x≈330) -->
  <g fill="#050505">
    <path d="M 326,622 C 323,572 325,514 330,462 C 332,447 334,436 336,430
             L 344,432 C 342,438 340,449 338,464 C 333,516 331,574 329,622 Z"/>
    <!-- Fronds -->
    <path d="M 340,432 C 323,421 297,411 268,407 C 298,403 326,415 340,432 Z"/>
    <path d="M 340,432 C 320,430 294,434 268,445 C 296,430 323,426 340,432 Z"/>
    <path d="M 340,432 C 325,441 300,452 272,456 C 302,448 327,438 340,432 Z"/>
    <path d="M 340,432 C 336,413 336,388 342,364 C 342,388 342,413 340,432 Z"/>
    <path d="M 340,432 C 357,421 383,411 412,407 C 382,403 354,415 340,432 Z"/>
    <path d="M 340,432 C 360,430 386,434 412,445 C 384,430 357,426 340,432 Z"/>
    <path d="M 340,432 C 357,417 374,398 380,374 C 372,398 354,419 340,432 Z"/>
    <path d="M 340,432 C 323,417 308,397 302,374 C 312,398 328,419 340,432 Z"/>
  </g>

  <!-- Palm tree — RIGHT (x≈950) -->
  <g fill="#050505">
    <path d="M 954,622 C 957,572 955,514 950,462 C 948,447 946,436 944,430
             L 936,432 C 938,438 940,449 942,464 C 947,516 949,574 951,622 Z"/>
    <!-- Fronds -->
    <path d="M 940,432 C 957,421 983,411 1012,407 C 982,403 954,415 940,432 Z"/>
    <path d="M 940,432 C 960,430 986,434 1012,445 C 984,430 957,426 940,432 Z"/>
    <path d="M 940,432 C 955,441 980,452 1008,456 C 978,448 953,438 940,432 Z"/>
    <path d="M 940,432 C 944,413 944,388 938,364 C 938,388 938,413 940,432 Z"/>
    <path d="M 940,432 C 923,421 897,411 868,407 C 898,403 926,415 940,432 Z"/>
    <path d="M 940,432 C 920,430 894,434 868,445 C 896,430 923,426 940,432 Z"/>
    <path d="M 940,432 C 923,417 906,397 900,374 C 908,398 926,419 940,432 Z"/>
    <path d="M 940,432 C 957,417 972,397 978,374 C 968,398 952,419 940,432 Z"/>
  </g>

  <!-- Scarlet's chip truck — bottom-left -->
  <g fill="#040404">
    <rect x="28"  y="582" width="185" height="44"/>
    <rect x="40"  y="562" width="92"  height="24"/>
    <rect x="36"  y="572" width="4"   height="14"/>
    <circle cx="68"  cy="630" r="15" fill="#030303"/>
    <circle cx="68"  cy="630" r="5"  fill="#060606"/>
    <circle cx="180" cy="630" r="15" fill="#030303"/>
    <circle cx="180" cy="630" r="5"  fill="#060606"/>
  </g>

  <!-- Horizon glow line -->
  <line x1="0" y1="612" x2="1280" y2="612" stroke="rgba(180,50,28,0.18)" stroke-width="1"/>

  <!-- ═══ VIGNETTE ═══ -->
  <rect width="1280" height="720" fill="url(#vignette)"/>

  <!-- ═══ TITLE TREATMENT ═══ -->

  <!-- Decorative rules flanking "THE" -->
  <line x1="348" y1="177" x2="555" y2="177" stroke="rgba(202,138,4,0.28)" stroke-width="1"/>
  <line x1="725" y1="177" x2="932" y2="177" stroke="rgba(202,138,4,0.28)" stroke-width="1"/>

  <!-- "THE" eyebrow -->
  <text x="640" y="185"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="23"
        font-weight="400"
        fill="#CA8A04"
        letter-spacing="22"
        filter="url(#goldGlow)">THE</text>

  <!-- "VILLAGE" — white, large serif -->
  <text x="640" y="325"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="148"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-4"
        filter="url(#wShadow)">VILLAGE</text>

  <!-- "PEOPLE" — scarlet red, with glow -->
  <text x="640" y="455"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="148"
        font-weight="700"
        fill="#B91C1C"
        letter-spacing="-4"
        filter="url(#redGlow)">PEOPLE</text>

  <!-- Divider -->
  <line x1="380" y1="474" x2="900" y2="474" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="640" y="503"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="15"
        font-weight="300"
        fill="rgba(255,255,255,0.38)"
        letter-spacing="7">SOMETHING IS ALWAYS SLIGHTLY&#x2026; OFF.</text>

  <!-- Genre strip -->
  <text x="640" y="553"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="rgba(255,255,255,0.18)"
        letter-spacing="4">REAL ESTATE · GAME SHOW · CENTRAL FLORIDA</text>

  <!-- ═══ STREAMING BADGE — top right ═══ -->
  <rect x="1204" y="24" width="56" height="36" rx="3" fill="#E50914"/>
  <text x="1232" y="50"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="26"
        font-weight="900"
        fill="white">N</text>

  <!-- ═══ PRODUCTION CREDIT — bottom left ═══ -->
  <text x="28" y="704"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        fill="rgba(255,255,255,0.18)"
        letter-spacing="2">GEORGE SOREL GROUP PRODUCTIONS  ·  STAR STUDDED REALTY GROUP  ·  FL RE LIC. #SL3472560</text>

  <!-- Film grain overlay -->
  <rect width="1280" height="720" opacity="0.035" filter="url(#grain)"/>

</svg>
